<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiveLink Auction Overlay</title>
<style>
  :root{--cyan:#25F4EE;--pink:#FF3C8C;--gold:#FFC400;--bg:rgba(16,17,26,0.82);--line:rgba(255,255,255,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
  html,body{background:transparent;overflow:hidden;}
  #wrap{position:fixed;top:24px;left:50%;transform:translateX(-50%);width:560px;}
  .card{background:var(--bg);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:20px;
    padding:22px 26px;box-shadow:0 18px 50px rgba(0,0,0,0.45);opacity:0;transform:translateY(-14px);
    transition:opacity .35s,transform .35s;}
  .card.show{opacity:1;transform:translateY(0);}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .tag{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;}
  .vouch{font-size:12px;font-weight:700;color:var(--gold);}
  .prize{font-size:30px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:14px;}
  .timer{font-size:72px;font-weight:800;line-height:1;letter-spacing:1px;
    background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;}
  .bar{height:8px;background:rgba(255,255,255,0.10);border-radius:6px;margin:14px 0 16px;overflow:hidden;}
  .fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--pink));transition:width .4s linear;}
  .lead{display:flex;align-items:center;justify-content:space-between;}
  .lead .who{font-size:20px;font-weight:700;color:#fff;}
  .lead .label{font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.55);text-transform:uppercase;}
  .lead .amt{font-size:20px;font-weight:800;color:var(--pink);}
  .winner{margin-top:6px;font-size:22px;font-weight:800;color:var(--gold);text-align:center;}
  .pulse{animation:pulse .9s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
</style>
</head>
<body>
<div id="wrap"><div class="card" id="card">
  <div class="top"><div class="tag" id="tag">Auction</div><div class="vouch" id="vouch"></div></div>
  <div class="prize" id="prize">—</div>
  <div class="timer" id="timer">0:00</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="lead"><div><div class="label">Leading</div><div class="who" id="leader">—</div></div>
    <div class="amt" id="amount"></div></div>
  <div class="winner" id="winner"></div>
</div></div>
<script>
  const card=document.getElementById('card');
  const params=new URLSearchParams(location.search);
  const KEY=params.get('key')||'';
  let startDuration=0;
  function fmt(s){s=Math.max(0,Math.floor(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  async function tick(){
    try{
      const a=await (await fetch('/auction?key='+encodeURIComponent(KEY),{cache:'no-store'})).json();
      if(!a.active && !a.winner){card.classList.remove('show');return;}
      card.classList.add('show');
      document.getElementById('prize').textContent=a.prize||'Prize';
      const tEl=document.getElementById('timer');
      if(a.winner){
        document.getElementById('tag').textContent='Sold!';
        tEl.textContent='0:00';document.getElementById('fill').style.width='0%';
        document.getElementById('leader').textContent=a.winner;
        document.getElementById('amount').textContent=a.leader_amount?(a.leader_amount+' coins'):'';
        document.getElementById('winner').textContent='🏆 '+a.winner+' wins!';
        document.getElementById('vouch').textContent=(a.vouches_for_winner||0)?('✔ '+a.vouches_for_winner+' vouches'):'';
        tEl.classList.remove('pulse');
      }else{
        document.getElementById('tag').textContent=a.paused?'Paused':'Auction';
        document.getElementById('winner').textContent='';
        tEl.textContent=fmt(a.remaining);
        document.getElementById('leader').textContent=a.leader||'no bids yet';
        document.getElementById('amount').textContent=a.leader_amount?(a.leader_amount+' coins'):'';
        document.getElementById('vouch').textContent='';
        if(a.remaining>startDuration)startDuration=a.remaining;
        document.getElementById('fill').style.width=(startDuration>0?Math.max(0,Math.min(100,(a.remaining/startDuration)*100)):0)+'%';
        tEl.classList.toggle('pulse',a.remaining<=10 && !a.paused);
      }
    }catch(e){}
  }
  setInterval(tick,500);tick();
</script>
</body>
</html>
